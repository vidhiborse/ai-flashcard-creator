<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Flashcard Creator</title>
    
    <!-- Favicon -->
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    
    <!-- Preload critical pages -->
    <link rel="prefetch" href="/dashboard">
    <link rel="prefetch" href="/study">
    <link rel="prefetch" href="/chat">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GX5FJ3D02L"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-GX5FJ3D02L');
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float-up linear infinite;
            z-index: 1;
        }

        @keyframes float-up {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) scale(1);
            }
        }

        /* Glassmorphism container */
        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin: 30px auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 70px;
            margin-bottom: 16px;
            display: inline-block;
            animation: bounceIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 8px 16px rgba(102, 126, 234, 0.3));
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3) rotate(-15deg);
            }
            50% {
                transform: scale(1.1) rotate(5deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .logo h1 {
            color: #1a202c;
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #4a5568;
            font-size: 15px;
            font-weight: 500;
        }

        .error-msg, .success-msg {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 22px;
            display: none;
            font-weight: 500;
            animation: shake 0.5s ease-out;
        }

        .error-msg.show, .success-msg.show {
            display: block;
        }

        .error-msg {
            background: linear-gradient(135deg, #fed7d7 0%, #fecaca 100%);
            color: #c53030;
            border-left: 4px solid #fc8181;
        }

        .success-msg {
            background: linear-gradient(135deg, #c6f6d5 0%, #a7f3d0 100%);
            color: #2f855a;
            border-left: 4px solid #68d391;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-12px); }
            75% { transform: translateX(12px); }
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 9px;
            color: #1a202c;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 13px 17px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f7fafc;
            font-family: inherit;
            font-weight: 500;
        }

        .form-group input[type="password"] {
            padding-right: 50px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1),
                        0 4px 12px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .form-group input.valid {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .form-group input.invalid {
            border-color: #f56565;
            background: #fff5f5;
        }

        .form-group input::placeholder {
            color: #a0aec0;
        }

        /* Show/Hide password toggle */
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 4px;
            color: #718096;
            transition: all 0.3s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .password-toggle:hover {
            color: #667eea;
            transform: translateY(-50%) scale(1.1);
        }

        .password-toggle:active {
            transform: translateY(-50%) scale(0.95);
        }

        /* Password strength indicator */
        .password-strength {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .strength-weak { color: #e53e3e; }
        .strength-medium { color: #dd6b20; }
        .strength-strong { color: #38a169; }

        .strength-bars {
            display: flex;
            gap: 4px;
            flex: 1;
            max-width: 120px;
        }

        .strength-bar {
            height: 4px;
            flex: 1;
            background: #e2e8f0;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-bar.active-weak {
            background: #e53e3e;
        }

        .strength-bar.active-medium {
            background: #dd6b20;
        }

        .strength-bar.active-strong {
            background: #38a169;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            font-family: inherit;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            transform: translate(-50%, -50%);
            transition: width 0.7s, height 0.7s;
        }

        .btn-primary:hover::before {
            width: 350px;
            height: 350px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 35px 0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 55px;
            height: 55px;
            border: 5px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: #a0aec0;
            font-size: 14px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 2px solid #e2e8f0;
        }

        .divider::before {
            margin-right: 16px;
        }

        .divider::after {
            margin-left: 16px;
        }

        .login-link {
            text-align: center;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 18px;
        }

        .login-link a {
            color: #667eea;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .requirements {
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            padding: 16px;
            border-radius: 12px;
            font-size: 13px;
            border-left: 4px solid #667eea;
        }

        .requirements h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 700;
        }

        .requirements ul {
            margin-left: 20px;
            color: #4a5568;
            line-height: 2;
        }

        /* Touch-friendly mobile styles */
        @media (max-width: 768px) {
            .auth-container {
                padding: 32px 26px;
                max-width: 95%;
                border-radius: 20px;
            }
            
            .logo-icon {
                font-size: 60px;
            }
            
            .logo h1 {
                font-size: 28px;
            }

            .form-group {
                margin-bottom: 18px;
            }

            .form-group input {
                padding: 13px 16px;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .form-group input[type="password"] {
                padding-right: 48px;
            }

            .password-toggle {
                right: 14px;
                font-size: 22px;
                padding: 8px;
            }
            
            .btn-primary {
                padding: 15px;
                font-size: 16px;
                min-height: 52px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px 10px;
            }
            
            .auth-container {
                padding: 28px 20px;
                border-radius: 18px;
            }
            
            .logo-icon {
                font-size: 55px;
                margin-bottom: 12px;
            }
            
            .logo h1 {
                font-size: 26px;
            }
            
            .logo p {
                font-size: 14px;
            }

            .form-group {
                margin-bottom: 16px;
            }

            .form-group input {
                padding: 12px 14px;
            }

            .btn-primary {
                padding: 14px;
                font-size: 15px;
            }
        }

        /* Landscape orientation mobile */
        @media (max-height: 700px) and (orientation: landscape) {
            .auth-container {
                margin: 20px auto;
                max-height: 95vh;
                overflow-y: auto;
            }

            .logo-icon {
                font-size: 45px;
                margin-bottom: 8px;
            }

            .logo h1 {
                font-size: 24px;
                margin-bottom: 5px;
            }

            .logo p {
                font-size: 13px;
            }

            .logo {
                margin-bottom: 18px;
            }

            .form-group {
                margin-bottom: 14px;
            }

            .requirements {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">🚀</div>
            <h1>Create Account</h1>
            <p>Start your learning journey today!</p>
        </div>

        <div class="error-msg" id="error"></div>
        <div class="success-msg" id="success"></div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username"
                    required 
                    minlength="3"
                    autocomplete="username"
                    placeholder="At least 3 characters"
                    oninput="validateUsername()">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    required 
                    autocomplete="email"
                    placeholder="your@email.com"
                    oninput="validateEmail()">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        required 
                        minlength="6"
                        autocomplete="new-password"
                        placeholder="At least 6 characters"
                        oninput="checkPasswordStrength()">
                    <button type="button" class="password-toggle" onclick="togglePassword('password', 'toggleIcon1')" aria-label="Toggle password visibility">
                        <span id="toggleIcon1">👁️</span>
                    </button>
                </div>
                <div class="password-strength" id="passwordStrength"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="confirmPassword"
                        name="confirmPassword" 
                        required
                        autocomplete="new-password"
                        placeholder="Repeat your password"
                        oninput="validateConfirmPassword()">
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', 'toggleIcon2')" aria-label="Toggle password visibility">
                        <span id="toggleIcon2">👁️</span>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary">
                ✨ Create Account
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 18px; color: #4a5568; font-weight: 600;">
                Creating your account...
            </p>
        </div>

        <div class="divider">OR</div>

        <div class="login-link">
            Already have an account? <a href="/login">Login</a>
        </div>

        <div class="requirements">
            <h4>📋 Password Requirements:</h4>
            <ul>
                <li>At least 6 characters</li>
                <li>Mix of letters and numbers recommended</li>
                <li>Avoid common passwords</li>
            </ul>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particleCount = window.innerWidth > 768 ? 20 : 10;
            for (let i = 0; i < particleCount; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    const size = Math.random() * 6 + 3;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                    particle.style.animationDelay = Math.random() * 5 + 's';
                    document.body.appendChild(particle);
                }, i * 200);
            }
        }

        createParticles();

        // Toggle password visibility
        function togglePassword(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const toggleIcon = document.getElementById(iconId);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }

        // Validate username
        function validateUsername() {
            const input = document.getElementById('username');
            if (input.value.length >= 3) {
                input.classList.add('valid');
                input.classList.remove('invalid');
            } else if (input.value.length > 0) {
                input.classList.add('invalid');
                input.classList.remove('valid');
            } else {
                input.classList.remove('valid', 'invalid');
            }
        }

        // Validate email
        function validateEmail() {
            const input = document.getElementById('email');
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (emailPattern.test(input.value)) {
                input.classList.add('valid');
                input.classList.remove('invalid');
            } else if (input.value.length > 0) {
                input.classList.add('invalid');
                input.classList.remove('valid');
            } else {
                input.classList.remove('valid', 'invalid');
            }
        }

        // Check password strength
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthDiv = document.getElementById('passwordStrength');

            if (password.length === 0) {
                strengthDiv.innerHTML = '';
                return;
            }

            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/\d/.test(password)) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            let bars = '<div class="strength-bars">';
            let strengthClass = '';
            let strengthText = '';

            if (strength <= 2) {
                bars += '<div class="strength-bar active-weak"></div>';
                bars += '<div class="strength-bar"></div>';
                bars += '<div class="strength-bar"></div>';
                strengthClass = 'strength-weak';
                strengthText = '💡 Weak';
            } else if (strength <= 3) {
                bars += '<div class="strength-bar active-medium"></div>';
                bars += '<div class="strength-bar active-medium"></div>';
                bars += '<div class="strength-bar"></div>';
                strengthClass = 'strength-medium';
                strengthText = '👍 Medium';
            } else {
                bars += '<div class="strength-bar active-strong"></div>';
                bars += '<div class="strength-bar active-strong"></div>';
                bars += '<div class="strength-bar active-strong"></div>';
                strengthClass = 'strength-strong';
                strengthText = '🔒 Strong';
            }
            bars += '</div>';

            strengthDiv.innerHTML = `<span class="${strengthClass}">${strengthText}</span>${bars}`;
        }

        // Validate confirm password
        function validateConfirmPassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword');
            
            if (confirmPassword.value === password && confirmPassword.value.length > 0) {
                confirmPassword.classList.add('valid');
                confirmPassword.classList.remove('invalid');
            } else if (confirmPassword.value.length > 0) {
                confirmPassword.classList.add('invalid');
                confirmPassword.classList.remove('valid');
            } else {
                confirmPassword.classList.remove('valid', 'invalid');
            }
        }

        async function handleSignup(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            document.getElementById('error').classList.remove('show');
            document.getElementById('success').classList.remove('show');

            if (password !== confirmPassword) {
                showError('Passwords do not match!');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters!');
                return;
            }

            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loading').classList.add('show');

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('Account created! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showError(data.error || 'Signup failed');
                    document.getElementById('signupForm').style.display = 'block';
                }
            } catch (error) {
                showError('Network error. Please try again.');
                document.getElementById('signupForm').style.display = 'block';
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }

        function showError(message) {
            const div = document.getElementById('error');
            div.textContent = message;
            div.classList.add('show');
        }

        function showSuccess(message) {
            const div = document.getElementById('success');
            div.textContent = message;
            div.classList.add('show');
        }

        // Prevent zoom on iOS when focusing inputs
        if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', () => {
                    const viewport = document.querySelector('meta[name=viewport]');
                    viewport.setAttribute('content', 'width=device-width, initial-scale=1, maximum-scale=1');
                });
                input.addEventListener('blur', () => {
                    const viewport = document.querySelector('meta[name=viewport]');
                    viewport.setAttribute('content', 'width=device-width, initial-scale=1');
                });
            });
        }
    </script>
</body>
</html>
